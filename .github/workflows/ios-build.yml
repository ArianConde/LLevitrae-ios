name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🔧 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Instalar Capacitor
        run: |
          npm install @capacitor/core @capacitor/ios @capacitor/cli
          # 🔑 Reparar permisos de los ejecutables de Capacitor
          chmod +x node_modules/.bin/cap
          chmod +x node_modules/.bin/capacitor

      - name: ⚙️ Inicializar Capacitor
        run: |
          npx cap init LLevitrae com.llevitrae.app --web-dir=www

      - name: 📱 Añadir plataforma iOS
        run: npx cap add ios

      - name: 🔄 Sincronizar con Capacitor
        run: npx cap sync ios

      - name: 🏗️ Compilar app iOS
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 📦 Empaquetar IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r LLevitrae.ipa Payload

      - name: 📤 Subir IPA como artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLevitrae-iOS
          path: LLevitrae.ipa
          retention-days: 7