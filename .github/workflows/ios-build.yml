name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🔧 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Instalar Capacitor
        run: |
          set -x
          npm install @capacitor/core @capacitor/ios @capacitor/cli
          echo "exit code npm install: $?"
          # Detectamos la ruta real del bin en vez de asumirla fija (puede variar entre versiones)
          CAP_BIN=$(node -e "console.log(require.resolve('@capacitor/cli/package.json'))" | xargs dirname)
          CAP_BIN_FILE=$(node -e "const p=require('$CAP_BIN/package.json'); console.log(typeof p.bin==='string'?p.bin:p.bin.cap)")
          CAP_BIN="$CAP_BIN/$CAP_BIN_FILE"
          ls -l "$CAP_BIN"
          echo "CAP_BIN=$CAP_BIN" >> "$GITHUB_ENV"

      - name: ⚙️ Inicializar Capacitor
        run: |
          set -x
          node "$CAP_BIN" init LLevitrae com.llevitrae.app --web-dir=www
          echo "exit code cap init: $?"

      - name: 📱 Añadir plataforma iOS
        run: |
          set -x
          # Aseguramos estado limpio: si ios/ ya existe (p.ej. quedó comiteada de antes), la borramos
          rm -rf ios
          node "$CAP_BIN" add ios
          echo "exit code cap add ios: $?"

      - name: 🔄 Sincronizar con Capacitor
        run: |
          set -x
          node "$CAP_BIN" sync ios
          echo "exit code cap sync: $?"

      - name: 🔧 Configurar Xcode
        run: |
          set -x
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          sudo xcodebuild -runFirstLaunch
          echo "exit code xcode setup: $?"

      - name: 🧩 Instalar CocoaPods y dar permisos a todos los scripts
        run: |
          set -x
          cd ios/App
          which pod || sudo gem install cocoapods
          pod install --repo-update
          echo "exit code pod install: $?"
          find . -type f -name "*.sh" -exec chmod +x {} \;
          echo "--- scripts .sh encontrados y su permiso ---"
          find . -type f -name "*.sh" -exec ls -l {} \;

      - name: 🏗️ Compilar app iOS
        run: |
          set -x
          cd ios/App
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          echo "exit code xcodebuild: $?"

      - name: 📦 Empaquetar IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r LLevitrae.ipa Payload

      - name: 📤 Subir IPA como artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLevitrae-iOS
          path: LLevitrae.ipa
          retention-days: 7
