name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🔧 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Instalar Capacitor
        run: |
          npm install @capacitor/core @capacitor/ios @capacitor/cli

      - name: ⚙️ Inicializar Capacitor
        run: |
          npx cap init LLevitrae com.llevitrae.app --web-dir=www

      - name: 📱 Añadir plataforma iOS
        run: npx cap add ios

      - name: 🔄 Sincronizar con Capacitor
        run: npx cap sync ios

      - name: 🔧 Configurar Xcode y permisos
        run: |
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          sudo xcodebuild -run-first-launch
          # Dar permisos de ejecución a los scripts de CocoaPods
          chmod +x ios/App/Pods/*.sh || true
          chmod +x ios/App/*.sh || true

      - name: 🏗️ Compilar app iOS
        run: |
          cd ios/App
          # Usar bash explícitamente para ejecutar xcodebuild
          bash -c "xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO"

      - name: 📦 Empaquetar IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r LLevitrae.ipa Payload

      - name: 📤 Subir IPA como artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLevitrae-iOS
          path: LLevitrae.ipa
          retention-days: 7